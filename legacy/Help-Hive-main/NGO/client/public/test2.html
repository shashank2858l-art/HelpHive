<!DOCTYPE html>
<html>
<head><style>body { background: #111; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }</style></head>
<body>
<svg viewBox='0 0 100 100' width='300' height='300' xmlns='http://www.w3.org/2000/svg'>
  <!-- Layout grid for centering check -->
  <line x1='50' y1='0' x2='50' y2='100' stroke='#333' stroke-width='0.5'/>
  <line x1='0' y1='50' x2='100' y2='50' stroke='#333' stroke-width='0.5'/>
  <circle cx='50' cy='50' r='35' stroke='#333' stroke-width='0.5' fill='none'/>

  <!-- Saffron Ribbon -->
  <path d='M 15 50 A 35 35 0 0 1 85 50 A 35 20 0 0 0 15 50 Z' fill='#FF9933'/>
  
  <!-- Green Ribbon -->
  <path d='M 85 50 A 35 35 0 0 1 15 50 A 35 20 0 0 0 85 50 Z' fill='#138808'/>

  <!-- Ashoka Chakra -->
  <g stroke='#000080'>
    <circle cx='50' cy='50' r='14' stroke-width='2' fill='none'/>
    <circle cx='50' cy='50' r='11' stroke-width='0.5' fill='none'/>
    <circle cx='50' cy='50' r='2' fill='#000080'/>
  </g>
</svg>
</body>
</html>
