<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globe Express | Cinematic Travel Showcase</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Initial Loading Cover -->
    <div class="page-cover"></div>

    <!-- Top Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-left">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            <span class="nav-brand">AidFlow</span>
        </div>
        
        <div class="nav-center">
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Volunteers</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Resources</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <button class="icon-btn" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="icon-btn profile-btn" aria-label="Profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Main Slider Application -->
    <main class="slider-app">
        
        <!-- Full Screen Backgrounds container -->
        <div class="backgrounds-container">
            <!-- Background Images will be injected here via JS -->
            <div class="bg-img active" style="background-image: url('https://images.unsplash.com/photo-1593113589914-075997230b53?q=80&w=2070&auto=format&fit=crop');"></div>
        </div>

        <!-- Hero Content Layer (Top Left) -->
        <div class="hero-content">
            <div class="location-wrapper">
                <p class="location-text">
                    <svg class="pin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <span class="val">Global Reach</span>
                </p>
            </div>
            
            <div class="title-wrapper">
                <h1 class="title">
                    <div class="title-line">CRISIS</div>
                    <div class="title-line">RESPONSE</div>
                </h1>
            </div>
            
            <div class="desc-wrapper">
                <p class="description">
                    Coordinating fast and effective responses to natural disasters and humanitarian crises around the world, empowered by our dedicated network.
                </p>
            </div>

            <div class="actions-wrapper">
                <button class="btn btn-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                </button>
                <button class="btn btn-outline">View Dashboard</button>
            </div>
        </div>

        <!-- Slider Cards Stack (Bottom Right) -->
        <div class="cards-container">
            <!-- Cards will be injected via JS to ensure logic control, but here's the structure -->
            <div class="card-stack"></div>
        </div>

        <!-- Bottom Pagination Controls -->
        <div class="pagination-controls">
            <div class="controls-left">
                <button class="nav-arrow prev">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <button class="nav-arrow next">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </div>
            <div class="controls-right">
                <div class="slide-numbers">
                    <span class="current">01</span>
                </div>
            </div>
        </div>

    </main>

    <!-- GSAP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CSSRulePlugin.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
